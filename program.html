<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program — Cinema World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header">
    <div id="header-inner">
        <a href="index.html" id="logo">Cinema<span>World</span></a>
        <ul id="nav">
            <li><a href="index.html">Acasă</a></li>
            <li><a href="filme.html">Filme</a></li>
            <li><a href="recenzii.html">Recenzii</a></li>
            <li><a href="program.html" class="active">Program</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>
</div>

<div id="hero">
    <div id="wrapper">
        <div id="hero-image">
            <img src="image.avif" alt="Program Cinema">
        </div>
        <h1>Program <span class="accent">Cinema</span></h1>
    </div>
</div>

<hr>

<div id="main">
    <div id="wrapper">
        <h2>Rulaj săptămânal</h2>
        <table id="schedule-table">
            <tr>
                <th>Film</th>
                <th>Ora</th>
            </tr>
            <tr>
                <td>Inception</td>
                <td>18:00</td>
            </tr>
            <tr>
                <td>Interstellar</td>
                <td>20:30</td>
            </tr>
        </table>
    </div>
</div>

<div id="footer">
    <p>© 2025 CinemaWorld <span class="glow-dot"></span> Toate drepturile rezervate</p>
</div>

<script>
    // 1. Mesaj de bun venit
    alert("Bun venit pe Cinema World!");

    // 2. Click pe logo schimba culoarea temporar
    document.getElementById("logo").addEventListener("click", function(e) {
        e.preventDefault();
        this.style.color = "#c0392b";
        var self = this;
        setTimeout(function() { window.location.href = "index.html"; }, 350);
    });

    // 3. Efect hover pe linkurile din nav
    var navLinks = document.querySelectorAll("#nav a");
    navLinks.forEach(function(link) {
        link.addEventListener("mouseenter", function() {
            this.style.textDecoration = "underline";
        });
        link.addEventListener("mouseleave", function() {
            this.style.textDecoration = "";
        });
    });
</script>
</body>
</html>
